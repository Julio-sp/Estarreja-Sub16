<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAC SCOUT - RECOVERY</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --v: #2e7d32; --d: #0f172a; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background: var(--bg); color: var(--d); }

        /* LOADER DE DIAGNÓSTICO */
        #loading { 
            position: fixed; inset: 0; background: white; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; text-align: center; font-weight: 900;
        }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* BANNER */
        .hero { background: var(--v); margin: 75px 15px 20px 15px; padding: 35px 20px; border-radius: 20px; text-align: center; }
        .hero h1 { font-size: 2rem; font-weight: 900; line-height: 1.1; text-transform: uppercase; }
        .p { color: #000; } .b { color: #fff; }

        .container { padding: 0 15px 100px 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .g-row { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .tm img { width: 45px; height: 45px; object-fit: contain; }
        .tm b { display: block; font-size: 0.6rem; margin-top: 5px; }
        .sc { font-size: 1.8rem; font-weight: 900; }

        #side { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--d); z-index: 1100; transition: 0.3s; padding-top: 60px; }
        #side.active { left: 0; }
        #side a { display: block; padding: 15px 25px; color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: 700; border-bottom: 1px solid #1e293b; }
        
        .btn-gps { display: block; width: 100%; padding: 12px; background: #dcfce7; color: #15803d; text-align: center; border-radius: 10px; text-decoration: none; font-weight: 800; margin-top: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="loading">
        <div id="status">CONECTANDO ÀS PLANILHAS...</div>
        <div id="details" style="font-size: 0.7rem; color: gray; margin-top: 10px; font-weight: 400;"></div>
    </div>

    <header>
        <div onclick="tgl()" style="font-size: 24px; color: var(--v);">☰</div>
        <img src="logo.png" style="height: 40px;" onerror="this.src='https://raw.githubusercontent.com/estarrejaandebolclube/site/main/logo.png'">
        <div onclick="location.reload()">🔄</div>
    </header>

    <nav id="side">
        <a onclick="vw('home')">🏠 INÍCIO</a>
        <a onclick="render('SUB16')">👥 SUB-16 FEM</a>
        <a onclick="render('SUB18')">👥 SUB-18 FEM</a>
        <a onclick="cal()">📅 CALENDÁRIO</a>
    </nav>

    <main id="main">
        <div id="p-home">
            <div class="hero">
                <h1><span class="p">ESTARREJA</span><br><span class="b">ANDebol</span><br><span class="p">CLUBE</span></h1>
            </div>
            <div class="container" id="home-content"></div>
        </div>
        <div id="p-dyn" class="container" style="display:none; margin-top: 80px;">
            <h2 id="dyn-ttl" style="margin-bottom: 20px;"></h2>
            <div id="dyn-cnt"></div>
        </div>
    </main>

<script>
    // URLs ORIGINAIS DA V13
    const URLS = {
        atleta: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=0&single=true&output=csv",
        jogo: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqkp-Fv6iE5jweFA851ua8LXnMl53YQHgqU0-qnXq6rC5dfnGhIJMmZaVDN5Izc3Z5_JA15a1Iz2Lw/pub?gid=1340468570&single=true&output=csv"
    };

    let DB = { atletas: [], jogos: [] };

    async function start() {
        const details = document.getElementById('details');
        try {
            details.innerText = "Baixando atletas...";
            const resAt = await fetch(URLS.atleta);
            if(!resAt.ok) throw new Error("Falha na planilha de Atletas");
            const txtAt = await resAt.text();
            DB.atletas = parse(txtAt);

            details.innerText = "Baixando jogos...";
            const resJg = await fetch(URLS.jogo);
            if(!resJg.ok) throw new Error("Falha na planilha de Jogos");
            const txtJg = await resJg.text();
            DB.jogos = parse(txtJg);

            details.innerText = "Renderizando...";
            showHome();
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('status').innerHTML = "<span style='color:red'>ERRO CRÍTICO</span>";
            details.innerHTML = `${e.message}<br><br>Verifique se a planilha está 'Publicada na Web' como CSV.`;
        }
    }

    function parse(csv) {
        const rows = csv.split('\n').filter(r => r.trim() !== "");
        const head = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
        return rows.slice(1).map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let obj = {};
            head.forEach((h, i) => obj[h] = cols[i] ? cols[i].replace(/"/g, '').trim() : "");
            return obj;
        });
    }

    function showHome() {
        const prox = DB.jogos.filter(j => j.Gols_EAC === "").slice(0, 2);
        document.getElementById('home-content').innerHTML = `
            <h3 style="margin-bottom:15px">PRÓXIMOS JOGOS</h3>
            ${prox.map(j => card(j)).join('')}
        `;
    }

    function card(j) {
        const fora = j.Onde.toLowerCase() === 'fora';
        const eacLogo = "https://raw.githubusercontent.com/estarrejaandebolclube/site/main/logo.png";
        return `
            <div class="card">
                <div style="font-size:0.6rem; font-weight:900; color:var(--v); margin-bottom:10px;">${j.Escalao} | ${j.Data}</div>
                <div class="g-row">
                    <div class="tm"><img src="${fora ? j.Logo_Adversario : eacLogo}" onerror="this.src='https://via.placeholder.com/50'"><b>${fora ? j.Adversário : 'EAC'}</b></div>
                    <div class="sc">${j.Gols_EAC || 'VS'}</div>
                    <div class="tm"><img src="${fora ? eacLogo : j.Logo_Adversario}" onerror="this.src='https://via.placeholder.com/50'"><b>${fora ? 'EAC' : j.Adversário}</b></div>
                </div>
                <a href="${j.Link_GPS}" target="_blank" class="btn-gps">ABRIR LOCALIZAÇÃO</a>
            </div>
        `;
    }

    function render(esc) {
        vw('dyn');
        document.getElementById('dyn-ttl').innerText = "ELENCO " + esc;
        const list = DB.atletas.filter(a => a.Escalão && a.Escalão.includes(esc));
        document.getElementById('dyn-cnt').innerHTML = list.map(a => `
            <div class="card" style="display:flex; align-items:center;">
                <img src="${a.Foto}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; margin-right:15px">
                <b>${a.Nome}</b>
            </div>
        `).join('');
    }

    function cal() {
        vw('dyn');
        document.getElementById('dyn-ttl').innerText = "CALENDÁRIO";
        document.getElementById('dyn-cnt').innerHTML = DB.jogos.map(j => card(j)).join('');
    }

    function vw(v) {
        document.getElementById('p-home').style.display = v === 'home' ? 'block' : 'none';
        document.getElementById('p-dyn').style.display = v === 'dyn' ? 'block' : 'none';
        tgl();
    }

    function tgl() { document.getElementById('side').classList.toggle('active'); }

    window.onload = start;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estarreja Sub-16 Pro</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0f172a; color:white; }
        header { text-align:center; padding:20px; background:#020617; border-bottom: 3px solid #22c55e; }
        header img { height:70px; }
        nav { display:flex; background:#020617; border-bottom: 1px solid #1e293b; }
        nav button { flex:1; padding:15px; border:none; background:none; color:white; cursor:pointer; font-size: 18px; }
        .tab { display:none; padding:20px; }
        .active { display:block; }
        .stats-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap:10px; margin-bottom:20px; }
        .card { background:#1e293b; padding:15px; border-radius:12px; text-align:center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .big { font-size:24px; font-weight:bold; color:#22c55e; display:block; }
        .player-card { display: flex; justify-content: space-between; align-items: center; background:#1e293b; margin-bottom: 8px; padding: 15px; border-radius: 8px; border-left: 4px solid #22c55e; }
        .player-info { display: flex; flex-direction: column; }
        .player-name { font-weight: bold; font-size: 1.1em; }
        .player-goals { font-size: 1.2em; font-weight: bold; color: #22c55e; }
    </style>
</head>
<body>

<header>
    <h2>Estarreja Andebol Clube</h2>
    <div id="club-summary" style="font-size: 0.9em; color: #94a3b8;">Sub-16 Feminino</div>
</header>

<nav>
    <button onclick="tab('dash')">📊</button>
    <button onclick="tab('rank')">🏆</button>
</nav>

<div id="dash" class="tab active">
    <div class="stats-grid" id="main-stats">
        <!-- Preenchido via JS -->
    </div>
    <div id="motivational-msg" style="text-align:center; font-style:italic; color:#22c55e;"></div>
</div>

<div id="rank" class="tab">
    <h3>Artilheiras</h3>
    <div id="ranking-list"></div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9Ip29SsNYoB99RLWmse4JBY9zmokOhLsr8-yZGk9J_7Z_kIi7lToM3KlFoMz7byKYkuLRPYy_TJ8S/pub?output=csv";

function tab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function fetchData() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        const rows = data.split('\n').map(row => row.split(','));

        // 1. Extrair Dados do Topo (Células E2, F2, G2, H2 do print)
        // No CSV, os índices aproximados (ajustados conforme o print)
        const headerRow = rows[1]; // Linha 2
        const stats = {
            jogos: headerRow[4] || 0,
            vitorias: headerRow[5] || 0,
            derrotas: headerRow[6] || 0,
            golosM: headerRow[7] || 0
        };

        // 2. Extrair Jogadoras e Golos (Coluna C e Coluna R)
        // No print: Nomes começam na linha 6 (index 5) até a linha 18 (index 17)
        let players = [];
        for (let i = 5; i <= 18; i++) {
            let row = rows[i];
            if (row) {
                let name = row[2] ? row[2].replace(/"/g, '').trim() : "";
                let goals = row[17] ? parseInt(row[17].replace(/[^\d]/g, '')) : 0; // Coluna R é index 17
                
                if (name && name !== "" && name !== "Adversário") {
                    players.push({ name, goals });
                }
            }
        }

        // Ordenar por golos
        players.sort((a, b) => b.goals - a.goals);

        render(stats, players);
    } catch (e) {
        console.error("Erro:", e);
    }
}

function render(stats, players) {
    // Render Dash
    const totalGolosEquipa = players.reduce((sum, p) => sum + p.goals, 0);
    document.getElementById('main-stats').innerHTML = `
        <div class="card"><span class="big">${stats.jogos}</span>Jogos</div>
        <div class="card"><span class="big">${stats.vitorias}</span>Vitórias</div>
        <div class="card"><span class="big">${totalGolosEquipa}</span>Golos</div>
    `;

    // Render Ranking
    const list = document.getElementById('ranking-list');
    list.innerHTML = "";
    players.forEach((p, i) => {
        const medal = i === 0 ? "🥇 " : i === 1 ? "🥈 " : i === 2 ? "🥉 " : "";
        list.innerHTML += `
            <div class="player-card">
                <div class="player-info">
                    <span class="player-name">${medal}${p.name}</span>
                </div>
                <div class="player-goals">${p.goals}</div>
            </div>
        `;
    });

    const msgs = ["💚 Juntas somos imparáveis", "🔥 Foco total", "🏐 Uma equipa, um objetivo"];
    document.getElementById('motivational-msg').innerText = msgs[Math.floor(Math.random()*msgs.length)];
}

fetchData();
setInterval(fetchData, 30000); // Atualiza a cada 30 segundos
</script>

</body>
</html>
